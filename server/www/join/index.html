<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mussheum — stay updated</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --fg: #d0d0d0;
      --white: #e8e8e8;
      --dim: #676e95;
      --accent: #c792ea;
      --secondary: #c3e88d;
      --cyan: #8ae9fd;
      --mono: "JetBrains Mono", Menlo, Consolas, monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--mono);
      font-size: 14px;
      background: #000;
      color: var(--fg);
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .line {
      display: flex;
      align-items: center;
      min-height: 1.5rem;
      padding: 0 1.5rem;
      border-left: 2px solid transparent;
    }

    .line:hover { background: #323650; }

    .comment { color: var(--dim); }
    .cmd { color: var(--cyan); margin-right: 0.5ch; opacity: 0.85; }
    .arg { color: var(--accent); }
    .prompt { color: var(--secondary); margin-right: 0.5rem; }
    .highlight { color: var(--secondary); }

    .title {
      padding: 2rem 1.5rem 0;
      font-size: 1.5rem;
      color: var(--cyan);
    }

    .tagline {
      padding: 0.25rem 1.5rem 0;
      color: var(--dim);
      font-style: italic;
    }

    .email-line {
      display: flex;
      align-items: center;
      min-height: 2.5rem;
      padding: 0 1.5rem;
      border-left: 2px solid transparent;
      gap: 0;
    }

    .email-line:focus-within {
      background: #323650;
      border-left-color: var(--accent);
    }

    .email-line input[type="email"] {
      font-family: var(--mono);
      font-size: 14px;
      background: transparent;
      border: none;
      color: var(--fg);
      outline: none;
      width: 280px;
      caret-color: var(--accent);
    }

    .email-line input[type="email"]::placeholder {
      color: var(--dim);
    }

    .email-line input[type="submit"] {
      font-family: var(--mono);
      font-size: 14px;
      background: transparent;
      border: none;
      color: var(--dim);
      cursor: pointer;
      padding: 0;
    }

    .email-line input[type="submit"]:hover {
      color: var(--accent);
    }

    .footer {
      color: var(--dim);
      font-size: 12px;
    }

    @media (max-width: 480px) {
      .line, .email-line { padding: 0 1rem; }
      .title { padding: 1.5rem 1rem 0; }
      .tagline { padding: 0.25rem 1rem 0; }
    }
  </style>
</head>
<body>

  <!-- Replace "mussheum" with your gallery name -->
  <a href="/" style="text-decoration: none; color: inherit;"><h1 class="title">mussheum</h1></a>
  <p class="tagline">an ssh art gallery</p>

  <div class="line"></div>

  <div class="line">
    <span class="highlight"># stay updated</span>
  </div>
  <div class="line">
    <span class="comment"># get notified about upcoming exhibitions, openings, and calls for submissions.</span>
  </div>

  <div class="line"></div>

  <!--
    Newsletter signup form. Replace the action URL with your newsletter provider.
    This example uses Buttondown (https://buttondown.com).
    You can swap it for Mailchimp, ConvertKit, or any form endpoint.
  -->
  <form
    action="https://buttondown.com/api/emails/embed-subscribe/YOUR_NEWSLETTER_ID"
    method="post"
  >
    <div class="line email-line">
      <span class="prompt">$ </span>
      <input type="email" name="email" id="bd-email" placeholder="you@example.com" aria-label="Email address" autofocus />
      <input type="submit" value="# subscribe" />
    </div>
  </form>

  <div class="line"></div>

  <!-- Replace "your-host.example.com" with your SSH hostname -->
  <div class="line">
    <span class="comment"># visit the gallery: </span><span class="cmd">ssh </span><span class="arg">your-host.example.com</span>
  </div>
  <div class="line">
    <span class="comment"># submit artwork: <a href="/submissions">/submissions</a></span>
  </div>
  <div class="line">
    <span class="comment"># or learn more at <a href="/">the homepage</a></span>
  </div>

  <div class="line"></div>
  <div class="line"></div>

  <div class="line footer">
    <span class="comment"># powered by <a href="https://github.com/georgemandis/mussheum">mussheum</a></span>
  </div>

</body>
</html>
